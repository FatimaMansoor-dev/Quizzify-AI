<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZIFY-AI</title>
    <style>
        /* Set the background image with gradient overlay */
        body {
            background-color: rgb(0, 0, 0);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Style the navbar */
        .navbar {
        background-color: rgba(0, 0, 0, 0.8); /* Slightly transparent background */
        display: flex;
        align-items: center; /* Center align vertically */
        justify-content: space-between; /* Space between logo and user icon */
        padding: 10px 20px;
    }

    .navbar-brand {
        font-size: 3.5rem; /* Make the text big */
        color: rgb(28, 6, 109); /* Make the text purple */
        text-decoration: none; /* Remove underline */
        font-weight: bold;
        display: flex;
        align-items: center; /* Align text with image */
        text-shadow: 0 0 5px white, 0 0 10px white, 0 0 20px white, 0 0 30px white; /* Glowing effect */
    }


        .navbar-brand img {
            margin-right: 15px; /* Add space between the logo and text */
            width: 100px; /* Increased size */
            height: 100px; /* Increased size */
        }

        .navbar-brand:hover {
            text-decoration: underline; /* Add underline on hover */
        }

        /* Style for the user button */
        .user-button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .user-button img {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* Make the icon circular */
        }

        /* Sidebar styles */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.5);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidebar-content {
            padding: 20px;
            color: #333;
            font-size: 1.2rem;
        }

        .sidebar-close {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        .sidebar-close:hover {
            color: red;
        }

        /* Streak Tracker Section */
        .streak-tracker {
            margin: 20px auto;
            text-align: center;
            max-width: 900px;
            padding: 15px;
        }

        .streak-tracker h2 {
            margin-bottom: 15px;
            color: rgb(28, 6, 109);
            font-size: 1.8rem;
        }

        /* Style for day boxes */
.day {
    width: 15px; /* Reduced width */
    height: 15px; /* Reduced height */
    border: 1px solid #4b0082; /* Thinner border */
    border-radius: 2px; /* Smaller border-radius */
    cursor: pointer;
}

/* Streak tracker month-row */
.month-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, 15px); /* Updated size for boxes */
    gap: 0; /* Removed space between rows and columns */
    justify-content: center;
    margin-bottom: 0; /* Removed bottom margin */
}

    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <!-- Logo and title -->
        <a class="navbar-brand" href="#">
            <img src="../static/logo.png" class="d-inline-block align-top" alt="Logo">
            QUIZIFY-AI
        </a>
        
        <!-- User button -->
        <button class="user-button" onclick="openSidebar()">
            <img src="../static/user.png" alt="User">
        </button>
    </nav>

    <!-- Streak Tracker Section -->
    <div class="streak-tracker">
        <div id="calendar"></div>
    </div>

    <!-- JavaScript code to generate the calendar -->
    <script>
        // Days in each month
        const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        const calendar = document.getElementById("calendar");

        daysInMonth.forEach((days, monthIndex) => {
            // Create a row for each month
            const row = document.createElement("div");
            row.className = "month-row";

            for (let day = 1; day <= days; day++) {
                const dayBox = document.createElement("div");
                dayBox.className = "day";
                dayBox.title = `Month ${monthIndex + 1}, Day ${day}`;
                row.appendChild(dayBox);
            }

            calendar.appendChild(row);
        });
    </script>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
        <div class="sidebar-content">
            <h2>Name</h2>
            <p>Welcome to your profile!</p>
            <ul>
                <li><a href="#">streak</a></li>
                <li><a href="#">avg score</a></li>
                <li><a href="#">last score</a></li>
            </ul>
        </div>
    </div>

    <script>
        function openSidebar() {
            document.getElementById("sidebar").style.width = "300px";
        }

        function closeSidebar() {
            document.getElementById("sidebar").style.width = "0";
        }
    </script>
</body>
</html>
