<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizRise - Create Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white w-[90%] max-w-4xl p-6 shadow-lg rounded-lg">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="text-purple-600 text-xl font-bold flex items-center">
                <span class="mr-2">📖</span> QuizRise
            </div>
            <button class="bg-purple-600 text-white px-4 py-2 rounded-md text-sm">Upgrade</button>
        </div>

        <!-- Progress Steps -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex-1 text-center">
                <div class="bg-purple-600 text-white py-2 px-4 rounded-full inline-block">1</div>
                <p class="text-sm mt-1 font-semibold">YouTube URL</p>
            </div>
            <div class="border-t-2 border-gray-300 flex-1 mx-2"></div>
            <div class="flex-1 text-center">
                <div class="bg-gray-300 text-gray-600 py-2 px-4 rounded-full inline-block">2</div>
                <p class="text-sm mt-1 text-gray-600">Configure Quiz</p>
            </div>
            <div class="border-t-2 border-gray-300 flex-1 mx-2"></div>
            <div class="flex-1 text-center">
                <div class="bg-gray-300 text-gray-600 py-2 px-4 rounded-full inline-block">3</div>
                <p class="text-sm mt-1 text-gray-600">Output Options</p>
            </div>
        </div>

        <!-- Input Section -->
        <form id="quizForm" action="/generate_transcript" method="POST" class="bg-gray-50 p-4 rounded-md mb-6">
            <label class="block text-gray-700 font-semibold mb-2">YouTube Video URL 🎥</label>
            <input type="text" name="youtube_url" placeholder="https://www.youtube.com/watch?v=example" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500" required>
            <p class="text-gray-500 text-sm mt-2">Please enter a valid YouTube video URL.</p>
        </form>

        <!-- Button -->
        <div class="flex justify-end">
            <button type="submit" form="quizForm" class="bg-purple-600 text-white px-6 py-2 rounded-md text-lg">Next Step</button>
        </div>
    </div>
</body>
</html>
